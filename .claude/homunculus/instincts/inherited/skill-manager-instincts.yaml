# Skill Manager Workflow Update Project Metadata Across Configs

## Action

Follow the update-project-metadata-across-configs workflow:
1. Update package.json with new name or version
2. Update tauri.conf.json with new productName, identifier, or version
3. Update Cargo.toml with new package name, lib name, or version
4. Update workflow files (e.g., .github/workflows/tauri.yml) to match new metadata
5. Update documentation files (e.g., README.md, README_CN.md) to reflect new name/version
6. Update other related config files (e.g., windows-manifest.xml, types.ts comments)
7. Commit all changes together

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: package.json, src-tauri/tauri.conf.json, src-tauri/Cargo.toml

